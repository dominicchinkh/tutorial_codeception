services:
  # Grafana Alloy batches and processes traces sent to it, generating
  # auto-logs from those traces.
  # Includes Metrics, Logs, Traces and Profiles.

  apache:
    container_name: apache
    hostname: apache
    image: httpd:2.4
    ports:
      - "80:80"
    volumes:
      - ./docker/apache/httpd.conf:/usr/local/apache2/conf/httpd.conf:ro
      - ./symfony:/var/www/symfony
    depends_on:
      - symfony
    networks:
      - znet

  symfony:
    container_name: symfony
    hostname: symfony
    depends_on:
      postgresql:
        condition: service_started
    build:
      context: .
      dockerfile: ./docker/symfony/Dockerfile
    environment:
      - DATABASE_SERVER=postgresql
      - DATABASE_SERVER_PORT=5432
    volumes:
      - ./symfony:/var/www/symfony:rw
    networks:
      - znet

  postgresql:
    container_name: postgresql
    hostname: postgresql
    image: postgis/postgis:17-master
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=symfony
    volumes:
      - postgres-data:/var/lib/postgresql/data:rw
    ports:
      - "5432:5432"
    networks:
      - znet

  selenium:
    image: selenium/standalone-chromium:latest
    # Docker's default shared memory is usually 64MB, which is insufficient for modern browsers. 
    # Setting this to 2gb is highly recommended for stability
    shm_size: 2gb
    ports:
      # This is the default port for the Selenium Grid/Hub. Your automation scripts (Python, Java, etc.) 
      # point here to send commands to the browser
      - "4444:4444"
      #  This is for noVNC, a web-based tool that lets you visually "see" the browser running inside the container
      - "7900:7900"
    environment:
      # Allows VNC access without a password
      - VNC_NO_PASSWORD=1
    networks:
      - znet

  firefox:
      image: selenium/standalone-firefox:latest
      # Docker's default shared memory is usually 64MB, which is insufficient for modern browsers. 
      # Setting this to 2gb is highly recommended for stability
      shm_size: 2gb
      ports:
        # This is the default port for the Selenium Grid/Hub. Your automation scripts (Python, Java, etc.) 
        # point here to send commands to the browser
        - "5555:4444"
        #  This is for noVNC, a web-based tool that lets you visually "see" the browser running inside the container
        - "7800:7900"
      environment:
        # Allows VNC access without a password
        - VNC_NO_PASSWORD=1
      networks:
        - znet

volumes:
  postgres-data:

networks:
  znet:
    ipam:
      config:
        - subnet: 192.168.39.0/24