# Codeception Test Suite Configuration
#
# Suite for unit or integration tests.

actor: UnitTester
error_level: E_ALL & ~E_STRICT & ~E_DEPRECATED
modules:
    enabled:
        - Asserts
        # - Db:
        #     dsn: 'pgsql:host=localhost;dbname=symfony_test'
        #     user: 'admin'
        #     password: 'password'
        - Doctrine:
            depends: Symfony
        - \App\Tests\Support\Module\MyCustomModule:
            name: 'My Custom Module'
            value: "%DATABASE_URL%"