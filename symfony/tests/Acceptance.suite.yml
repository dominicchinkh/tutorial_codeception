# Codeception Acceptance Test Suite Configuration
#
# Perform tests in a browser by either emulating one using PhpBrowser, or in a real browser using WebDriver.
# If you need both WebDriver and PhpBrowser tests, create a separate suite for each.

actor: AcceptanceTester
gherkin:
    contexts:
        default:
            - App\Tests\Acceptance\SignupContext

modules:
    enabled:
        # - PhpBrowser:
        #     url: http://localhost
        - WebDriver:
            url: http://apache
            browser: chrome

env:
    # You can specify different browsers for different environments and run tests in specific environment using
    #   `codecept run acceptance --env firefox`
    #   `codecept run acceptance --env chrome`

    # The WebDriver module will look for Selenium server on localhost:4444 by default, but you can specify a different 
    # host and port if needed

    # More info about WebDriver configuration: https://codeception.com/docs/modules/WebDriver

    # Unfortunately, selenium does not support Safari, so you cannot run tests in Safari browser using WebDriver module.

    chrome:
         modules:
            config:
                WebDriver:
                    browser: 'chrome'
                    port: 4444

    firefox:
        modules:
            config:
                WebDriver:
                    browser: 'firefox'
                    port: 5555

extensions:
    enabled:
        # The images are saved in the tests/_output/ folder by default
        - Codeception\Extension\Recorder:
            delete_successful: false
            delete_orphaned: true

# Add Codeception\Step\Retry trait to AcceptanceTester to enable retries
step_decorators:
    - Codeception\Step\ConditionalAssertion
    - Codeception\Step\TryTo
    - Codeception\Step\Retry
