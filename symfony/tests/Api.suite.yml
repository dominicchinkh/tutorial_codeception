actor: ApiTester
suite_namespace: App\Tests\Api
modules:
    # enable helpers as array
    enabled: 
        - REST:
            url: http://localhost/api/v1
            depends: PhpBrowser
            part: Json  #  Codeception handles both JSON and XML responses

# To enable steps with AsJson suffix enable 
step_decorators:
    - \Codeception\Step\AsJson
